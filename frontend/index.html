<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dataset Quality Analyzer — DataQA</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --primary: #6366f1; --primary-dark: #4f46e5; --primary-light: #e0e7ff;
  --success: #10b981; --warning: #f59e0b; --danger: #ef4444; --info: #3b82f6;
  --bg: #f8fafc; --bg-dark: #0f172a;
  --surface: #ffffff; --surface-dark: #1e293b;
  --border: #e2e8f0; --border-dark: #334155;
  --text: #0f172a; --text-muted: #64748b;
  --text-dark: #f1f5f9; --text-muted-dark: #94a3b8;
  --sidebar-w: 260px; --radius: 12px;
  --shadow: 0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);
  --shadow-lg: 0 10px 40px rgba(0,0,0,.12);
}
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); transition: background .3s, color .3s; }
body.dark { background: var(--bg-dark); color: var(--text-dark); }

/* ===== LAYOUT ===== */
.app-layout { display: flex; min-height: 100vh; }
.sidebar {
  width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; position: fixed; top: 0; left: 0; height: 100vh;
  z-index: 100; transition: transform .3s, background .3s, border .3s;
}
body.dark .sidebar { background: var(--surface-dark); border-color: var(--border-dark); }
.sidebar-logo { padding: 24px 20px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); }
body.dark .sidebar-logo { border-color: var(--border-dark); }
.sidebar-logo .logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; font-size: 18px; }
.sidebar-logo span { font-weight: 700; font-size: 15px; }
.sidebar-nav { flex: 1; padding: 16px 12px; display: flex; flex-direction: column; gap: 4px; overflow-y: auto; }
.nav-item {
  display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 8px;
  cursor: pointer; font-size: 14px; font-weight: 500; color: var(--text-muted);
  transition: all .2s; border: none; background: none; width: 100%; text-align: left;
}
.nav-item:hover { background: var(--primary-light); color: var(--primary); }
.nav-item.active { background: var(--primary-light); color: var(--primary); font-weight: 600; }
body.dark .nav-item { color: var(--text-muted-dark); }
body.dark .nav-item:hover, body.dark .nav-item.active { background: rgba(99,102,241,.15); color: #a5b4fc; }
.nav-item .nav-icon { font-size: 18px; width: 20px; text-align: center; }
.sidebar-footer { padding: 16px 12px; border-top: 1px solid var(--border); }
body.dark .sidebar-footer { border-color: var(--border-dark); }
.main-content { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
.topbar {
  height: 64px; background: var(--surface); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; padding: 0 28px;
  position: sticky; top: 0; z-index: 50; transition: background .3s, border .3s;
}
body.dark .topbar { background: var(--surface-dark); border-color: var(--border-dark); }
.topbar-title { font-size: 18px; font-weight: 700; }
.topbar-actions { display: flex; align-items: center; gap: 12px; }
.page-content { padding: 28px; flex: 1; }

/* ===== BUTTONS ===== */
.btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all .2s; text-decoration: none; }
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(99,102,241,.4); }
.btn-outline { background: transparent; color: var(--primary); border: 2px solid var(--primary); }
.btn-outline:hover { background: var(--primary-light); }
.btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--bg); }
body.dark .btn-ghost { color: var(--text-muted-dark); border-color: var(--border-dark); }
body.dark .btn-ghost:hover { background: rgba(255,255,255,.05); }
.btn-success { background: var(--success); color: white; }
.btn-success:hover { background: #059669; }
.btn-sm { padding: 6px 14px; font-size: 13px; }
.btn-lg { padding: 14px 28px; font-size: 16px; border-radius: 10px; }
.btn:disabled { opacity: .5; cursor: not-allowed; transform: none !important; }
.icon-btn { width: 38px; height: 38px; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid var(--border); background: var(--surface); font-size: 18px; transition: all .2s; }
.icon-btn:hover { background: var(--bg); }
body.dark .icon-btn { background: var(--surface-dark); border-color: var(--border-dark); }
body.dark .icon-btn:hover { background: rgba(255,255,255,.05); }

/* ===== CARDS ===== */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); transition: background .3s, border .3s; }
body.dark .card { background: var(--surface-dark); border-color: var(--border-dark); }
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.card-title { font-size: 16px; font-weight: 700; }
.card-subtitle { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
body.dark .card-subtitle { color: var(--text-muted-dark); }

/* ===== STAT CARDS ===== */
.stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; display: flex; align-items: center; gap: 16px; box-shadow: var(--shadow); transition: all .2s; }
body.dark .stat-card { background: var(--surface-dark); border-color: var(--border-dark); }
.stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
.stat-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
.stat-icon.purple { background: rgba(99,102,241,.12); }
.stat-icon.green  { background: rgba(16,185,129,.12); }
.stat-icon.yellow { background: rgba(245,158,11,.12); }
.stat-icon.red    { background: rgba(239,68,68,.12); }
.stat-icon.blue   { background: rgba(59,130,246,.12); }
.stat-value { font-size: 26px; font-weight: 800; line-height: 1; }
.stat-label { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
body.dark .stat-label { color: var(--text-muted-dark); }

/* ===== FORMS ===== */
.form-group { margin-bottom: 20px; }
.form-label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 6px; }
.form-input {
  width: 100%; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: 8px;
  font-size: 14px; font-family: inherit; background: var(--surface); color: var(--text);
  transition: border .2s, box-shadow .2s;
}
.form-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99,102,241,.12); }
body.dark .form-input { background: var(--surface-dark); border-color: var(--border-dark); color: var(--text-dark); }
body.dark .form-input:focus { border-color: #818cf8; }
.form-error { font-size: 12px; color: var(--danger); margin-top: 5px; }
.form-hint { font-size: 12px; color: var(--text-muted); margin-top: 5px; line-height: 1.5; }
body.dark .form-hint { color: var(--text-muted-dark); }

/* ===== UPLOAD ZONE ===== */
.upload-zone {
  border: 2px dashed var(--border); border-radius: var(--radius); padding: 48px 24px;
  text-align: center; cursor: pointer; transition: all .2s; background: var(--bg);
}
.upload-zone:hover, .upload-zone.drag-over { border-color: var(--primary); background: var(--primary-light); }
body.dark .upload-zone { background: rgba(255,255,255,.03); border-color: var(--border-dark); }
body.dark .upload-zone:hover, body.dark .upload-zone.drag-over { border-color: #818cf8; background: rgba(99,102,241,.1); }
.upload-icon { font-size: 48px; margin-bottom: 12px; }
.upload-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
.upload-subtitle { font-size: 13px; color: var(--text-muted); }
body.dark .upload-subtitle { color: var(--text-muted-dark); }
.upload-file-info { display: flex; align-items: center; gap: 12px; padding: 14px 16px; background: var(--primary-light); border-radius: 8px; margin-top: 16px; }
body.dark .upload-file-info { background: rgba(99,102,241,.15); }
.upload-file-name { font-size: 14px; font-weight: 600; color: var(--primary); flex: 1; }
.zip-indicator { background: rgba(245,158,11,.12); border: 1px solid rgba(245,158,11,.3); color: #d97706; border-radius: 8px; padding: 10px 14px; margin-top: 12px; font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 8px; }
body.dark .zip-indicator { background: rgba(245,158,11,.15); color: #fbbf24; }
.progress-bar-wrap { background: var(--border); border-radius: 99px; height: 8px; overflow: hidden; margin-top: 12px; }
body.dark .progress-bar-wrap { background: var(--border-dark); }
.progress-bar { height: 100%; background: linear-gradient(90deg, var(--primary), var(--primary-dark)); border-radius: 99px; transition: width .4s ease; }

/* ===== BADGES ===== */
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 99px; font-size: 12px; font-weight: 600; }
.badge-success { background: rgba(16,185,129,.12); color: #059669; }
.badge-warning { background: rgba(245,158,11,.12); color: #d97706; }
.badge-danger  { background: rgba(239,68,68,.12);  color: #dc2626; }
.badge-info    { background: rgba(59,130,246,.12);  color: #2563eb; }
.badge-purple  { background: rgba(99,102,241,.12);  color: var(--primary); }
body.dark .badge-success { background: rgba(16,185,129,.2);  color: #34d399; }
body.dark .badge-warning { background: rgba(245,158,11,.2);  color: #fbbf24; }
body.dark .badge-danger  { background: rgba(239,68,68,.2);   color: #f87171; }
body.dark .badge-info    { background: rgba(59,130,246,.2);  color: #60a5fa; }
body.dark .badge-purple  { background: rgba(99,102,241,.2);  color: #a5b4fc; }

/* ===== TABLE ===== */
.table-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); }
body.dark .table-wrap { border-color: var(--border-dark); }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
thead { background: var(--bg); }
body.dark thead { background: rgba(255,255,255,.04); }
th { padding: 12px 16px; text-align: left; font-weight: 600; font-size: 13px; color: var(--text-muted); border-bottom: 1px solid var(--border); white-space: nowrap; }
body.dark th { color: var(--text-muted-dark); border-color: var(--border-dark); }
td { padding: 12px 16px; border-bottom: 1px solid var(--border); }
body.dark td { border-color: var(--border-dark); }
tr:last-child td { border-bottom: none; }
tbody tr:hover { background: var(--bg); }
body.dark tbody tr:hover { background: rgba(255,255,255,.03); }
.highlight-row td { background: rgba(239,68,68,.05) !important; }
body.dark .highlight-row td { background: rgba(239,68,68,.1) !important; }

/* ===== AUTH PAGES ===== */
.auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 20px; }
.auth-card { background: var(--surface); border-radius: 20px; padding: 40px; width: 100%; max-width: 440px; box-shadow: var(--shadow-lg); }
body.dark .auth-card { background: var(--surface-dark); }
.auth-logo { text-align: center; margin-bottom: 28px; }
.auth-logo .logo-big { width: 56px; height: 56px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 28px; margin: 0 auto 12px; }
.auth-logo h1 { font-size: 22px; font-weight: 800; }
.auth-logo p { font-size: 14px; color: var(--text-muted); margin-top: 4px; }
body.dark .auth-logo p { color: var(--text-muted-dark); }
.auth-switch { text-align: center; margin-top: 20px; font-size: 14px; color: var(--text-muted); }
body.dark .auth-switch { color: var(--text-muted-dark); }
.auth-switch a { color: var(--primary); font-weight: 600; cursor: pointer; text-decoration: none; }

/* ===== LANDING PAGE ===== */
.landing { min-height: 100vh; background: var(--bg); }
body.dark .landing { background: var(--bg-dark); }
.landing-nav { display: flex; align-items: center; justify-content: space-between; padding: 20px 60px; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
body.dark .landing-nav { background: var(--surface-dark); border-color: var(--border-dark); }
.landing-nav .nav-logo { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 18px; }
.landing-nav .nav-logo .logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; font-size: 18px; }
.hero { padding: 100px 60px 80px; text-align: center; max-width: 900px; margin: 0 auto; }
.hero-badge { display: inline-flex; align-items: center; gap: 6px; background: var(--primary-light); color: var(--primary); padding: 6px 14px; border-radius: 99px; font-size: 13px; font-weight: 600; margin-bottom: 24px; }
body.dark .hero-badge { background: rgba(99,102,241,.2); color: #a5b4fc; }
.hero h1 { font-size: clamp(2.2rem, 5vw, 3.8rem); font-weight: 800; line-height: 1.15; margin-bottom: 20px; }
.hero h1 span { background: linear-gradient(135deg, var(--primary), #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.hero p { font-size: 18px; color: var(--text-muted); max-width: 600px; margin: 0 auto 36px; line-height: 1.7; }
body.dark .hero p { color: var(--text-muted-dark); }
.hero-actions { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
.features-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px; padding: 60px; max-width: 1200px; margin: 0 auto; }
.feature-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; transition: all .2s; }
body.dark .feature-card { background: var(--surface-dark); border-color: var(--border-dark); }
.feature-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
.feature-icon { font-size: 32px; margin-bottom: 14px; }
.feature-card h3 { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
.feature-card p { font-size: 14px; color: var(--text-muted); line-height: 1.6; }
body.dark .feature-card p { color: var(--text-muted-dark); }

/* ===== SCORE RING ===== */
.score-ring-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.score-ring { position: relative; }
.score-ring svg { transform: rotate(-90deg); display: block; }
.score-ring-text { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.score-ring-text .score-num { font-size: 26px; font-weight: 800; }
.score-ring-text .score-lbl { font-size: 11px; color: var(--text-muted); font-weight: 500; }
body.dark .score-ring-text .score-lbl { color: var(--text-muted-dark); }

/* ===== TOAST ===== */
.toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
.toast { display: flex; align-items: center; gap: 12px; padding: 14px 18px; border-radius: 10px; background: var(--surface); border: 1px solid var(--border); box-shadow: var(--shadow-lg); font-size: 14px; font-weight: 500; min-width: 280px; max-width: 380px; animation: slideUp .3s ease; }
body.dark .toast { background: var(--surface-dark); border-color: var(--border-dark); }
.toast-success { border-left: 4px solid var(--success); }
.toast-error   { border-left: 4px solid var(--danger); }
.toast-info    { border-left: 4px solid var(--info); }
.toast-warning { border-left: 4px solid var(--warning); }
@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

/* ===== COLLAPSIBLE SECTION ===== */
.collapsible-header { display: flex; align-items: center; justify-content: space-between; cursor: pointer; padding: 14px 16px; border-radius: 8px; background: var(--bg); font-weight: 600; font-size: 14px; transition: background .2s; user-select: none; }
.collapsible-header:hover { background: var(--border); }
body.dark .collapsible-header { background: rgba(255,255,255,.04); }
body.dark .collapsible-header:hover { background: rgba(255,255,255,.08); }
.collapsible-body { padding: 0 4px; margin-top: 12px; }

/* ===== TABS ===== */
.tab-bar { display: flex; gap: 4px; flex-wrap: wrap; border-bottom: 2px solid var(--border); margin-bottom: 20px; }
body.dark .tab-bar { border-color: var(--border-dark); }
.tab-btn { padding: 8px 16px; border: none; background: none; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text-muted); border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all .2s; border-radius: 6px 6px 0 0; }
.tab-btn:hover { color: var(--primary); background: var(--primary-light); }
.tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 700; }
body.dark .tab-btn { color: var(--text-muted-dark); }
body.dark .tab-btn:hover, body.dark .tab-btn.active { color: #a5b4fc; background: rgba(99,102,241,.1); }
body.dark .tab-btn.active { border-bottom-color: #818cf8; }

/* ===== CORRELATION HEATMAP ===== */
.heatmap-wrap { overflow-x: auto; }
.heatmap-table { border-collapse: collapse; font-size: 11px; }
.heatmap-table th { padding: 6px 10px; font-size: 11px; font-weight: 600; color: var(--text-muted); text-align: center; white-space: nowrap; max-width: 80px; overflow: hidden; text-overflow: ellipsis; }
.heatmap-table td { padding: 0; width: 60px; height: 44px; text-align: center; font-size: 11px; font-weight: 600; cursor: default; }
.heatmap-table td span { display: block; padding: 4px; }

/* ===== RECOMMENDATION CARDS ===== */
.rec-card { border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 14px; transition: border .2s; }
body.dark .rec-card { border-color: var(--border-dark); }
.rec-card:hover { border-color: var(--primary); }
.rec-card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; gap: 12px; }
.rec-card-title { display: flex; align-items: center; gap: 10px; font-size: 15px; font-weight: 700; }
.rec-card-body { font-size: 13px; color: var(--text-muted); line-height: 1.6; }
body.dark .rec-card-body { color: var(--text-muted-dark); }
.rec-card-body b { color: var(--text); font-weight: 600; }
body.dark .rec-card-body b { color: var(--text-dark); }
.rec-fix { font-family: 'Courier New', monospace; font-size: 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; margin-top: 8px; white-space: pre-wrap; word-break: break-all; line-height: 1.6; }
body.dark .rec-fix { background: rgba(0,0,0,.3); border-color: var(--border-dark); color: #a5b4fc; }

/* ===== SKELETON ===== */
.skeleton { background: linear-gradient(90deg, var(--border) 25%, #f1f5f9 50%, var(--border) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 6px; }
body.dark .skeleton { background: linear-gradient(90deg, var(--border-dark) 25%, rgba(255,255,255,.08) 50%, var(--border-dark) 75%); background-size: 200% 100%; }
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* ===== MISC ===== */
.section-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
.section-subtitle { font-size: 14px; color: var(--text-muted); margin-bottom: 24px; }
body.dark .section-subtitle { color: var(--text-muted-dark); }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 20px; }
.grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; }
.mt-4 { margin-top: 16px; }
.mt-6 { margin-top: 24px; }
.mb-4 { margin-bottom: 16px; }
.mb-6 { margin-bottom: 24px; }
.text-muted { color: var(--text-muted); }
body.dark .text-muted { color: var(--text-muted-dark); }
.text-sm { font-size: 13px; }
.font-bold { font-weight: 700; }
.w-full { width: 100%; }
.divider { height: 1px; background: var(--border); margin: 20px 0; }
body.dark .divider { background: var(--border-dark); }
.empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
body.dark .empty-state { color: var(--text-muted-dark); }
.empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-state h3 { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
body.dark .empty-state h3 { color: var(--text-dark); }
.chart-container { position: relative; height: 240px; }
.chart-container-sm { position: relative; height: 180px; }
.distributions-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
.menu-btn { display: none; }

/* ===== RESPONSIVE ===== */

// ============================================================
// DataQA — Dataset Risk Analyzer SPA  (v3)
// ============================================================
const { useState, useEffect, useRef, useCallback, createContext, useContext } = React;

// ============================================================
// APP CONTEXT
// ============================================================
const AppContext = createContext(null);

function AppProvider({ children }) {
  const [user, setUser] = useState(() => {
    try { return JSON.parse(localStorage.getItem('dqa_user')); } catch { return null; }
  });
  const [dark, setDark] = useState(() => localStorage.getItem('dqa_dark') === 'true');
  const [toasts, setToasts] = useState([]);

  useEffect(() => {
    document.body.classList.toggle('dark', dark);
    localStorage.setItem('dqa_dark', dark);
  }, [dark]);

  const login = useCallback((userData, token) => {
    localStorage.setItem('dqa_user', JSON.stringify(userData));
    localStorage.setItem('dqa_token', token);
    setUser(userData);
  }, []);

  const logout = useCallback(() => {
    localStorage.removeItem('dqa_user');
    localStorage.removeItem('dqa_token');
    setUser(null);
  }, []);

  const toast = useCallback((msg, type = 'info') => {
    const id = Date.now() + Math.random();
    setToasts(t => [...t, { id, msg, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 4000);
  }, []);

  return (
    <AppContext.Provider value={{ user, login, logout, dark, setDark, toast }}>
      {children}
      <ToastContainer toasts={toasts} />
    </AppContext.Provider>
  );
}
const useApp = () => useContext(AppContext);

// ============================================================
// TOAST
// ============================================================
function ToastContainer({ toasts }) {
  const icons = { success: '✅', error: '❌', info: 'ℹ️', warning: '⚠️' };
  return (
    <div className="toast-container">
      {toasts.map(t => (
        <div key={t.id} className={`toast toast-${t.type}`}>
          <span>{icons[t.type] || 'ℹ️'}</span><span>{t.msg}</span>
        </div>
      ))}
    </div>
  );
}

// ============================================================
// SCORE RING (SVG)
// ============================================================
function ScoreRing({ score, size = 120 }) {
  const r = 46, cx = 60, cy = 60;
  const circ = 2 * Math.PI * r;
  const pct = Math.min(Math.max(score || 0, 0), 100);
  const offset = circ - (pct / 100) * circ;
  const color = pct >= 75 ? '#10b981' : pct >= 50 ? '#f59e0b' : '#ef4444';
  return (
    <div className="score-ring-wrap">
      <div className="score-ring" style={{ width: size, height: size }}>
        <svg width={size} height={size} viewBox="0 0 120 120">
          <circle cx={cx} cy={cy} r={r} fill="none" stroke="#e2e8f0" strokeWidth="10" />
          <circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth="10"
            strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
            style={{ transition: 'stroke-dashoffset 1.2s ease' }} />
        </svg>
        <div className="score-ring-text">
          <span className="score-num" style={{ color }}>{pct}</span>
          <span className="score-lbl">/ 100</span>
        </div>
      </div>
      <span style={{ fontSize: 13, fontWeight: 600, color }}>
        {pct >= 90 ? 'Excellent' : pct >= 70 ? 'Good' : pct >= 50 ? 'Needs Cleaning' : 'High Risk'}
      </span>
    </div>
  );
}

// ============================================================
// SCORE BAR
// ============================================================
function ScoreBar({ label, value, max, color }) {
  const pct = Math.min(((value || 0) / max) * 100, 100);
  return (
    <div style={{ marginBottom: 12 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 13, marginBottom: 4 }}>
        <span style={{ color: 'var(--text-muted)' }}>{label}</span>
        <span style={{ fontWeight: 700 }}>{value || 0}/{max}</span>
      </div>
      <div style={{ height: 8, borderRadius: 99, background: 'var(--border)', overflow: 'hidden' }}>
        <div style={{ height: '100%', width: `${pct}%`, background: color, borderRadius: 99, transition: 'width 1s ease' }} />
      </div>
    </div>
  );
}

// ============================================================
// BAR CHART (Chart.js)
// ============================================================
function BarChart({ labels, values, color = '#6366f1', title }) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);
  const labelsKey = JSON.stringify(labels);

  useEffect(() => {
    if (!canvasRef.current) return;
    if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }
    const ctx = canvasRef.current.getContext('2d');
    chartRef.current = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: labels || [],
        datasets: [{ data: values || [], backgroundColor: color + 'cc', borderColor: color, borderWidth: 1, borderRadius: 4 }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ` ${ctx.parsed.y}` } } },
        scales: {
          x: { grid: { display: false }, ticks: { font: { size: 10 }, maxRotation: 45 } },
          y: { grid: { color: 'rgba(0,0,0,.06)' }, ticks: { font: { size: 10 } }, beginAtZero: true }
        }
      }
    });
    return () => { if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; } };
  }, [labelsKey, color]);

  return (
    <div>
      {title && <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 8, color: 'var(--text-muted)' }}>{title}</div>}
      <div className="chart-container"><canvas ref={canvasRef} /></div>
    </div>
  );
}

// ============================================================
// DONUT CHART (Chart.js)
// ============================================================
function DonutChart({ labels, values, colors }) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);
  const labelsKey = JSON.stringify(labels);

  useEffect(() => {
    if (!canvasRef.current) return;
    if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }
    const ctx = canvasRef.current.getContext('2d');
    chartRef.current = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: labels || [],
        datasets: [{ data: values || [], backgroundColor: colors || ['#6366f1','#10b981','#f59e0b','#ef4444'], borderWidth: 2 }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { position: 'bottom', labels: { font: { size: 11 }, padding: 12 } } },
        cutout: '60%'
      }
    });
    return () => { if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; } };
  }, [labelsKey]);

  return <div className="chart-container-sm"><canvas ref={canvasRef} /></div>;
}

// ============================================================
// CORRELATION HEATMAP (HTML table — NOT Chart.js)
// ============================================================
function CorrelationHeatmap({ cols, matrix }) {
  if (!cols || cols.length < 2 || !matrix) return null;

  function cellColor(val) {
    if (val === null || val === undefined) return 'rgba(128,128,128,.1)';
    const v = parseFloat(val);
    if (isNaN(v)) return 'rgba(128,128,128,.1)';
    const abs = Math.abs(v);
    if (v === 1.0) return 'rgba(79,70,229,0.85)';
    if (v >= 0) {
      if (abs >= 0.9) return `rgba(239,68,68,${0.3 + abs * 0.6})`;
      if (abs >= 0.7) return `rgba(245,158,11,${0.2 + abs * 0.6})`;
      if (abs >= 0.5) return `rgba(234,179,8,${0.15 + abs * 0.5})`;
      return `rgba(99,102,241,${0.05 + abs * 0.2})`;
    } else {
      if (abs >= 0.7) return `rgba(59,130,246,${0.2 + abs * 0.6})`;
      if (abs >= 0.4) return `rgba(96,165,250,${0.15 + abs * 0.5})`;
      return `rgba(147,197,253,${0.1 + abs * 0.3})`;
    }
  }

  function cellTextColor(val) {
    if (val === null || val === undefined) return 'var(--text-muted)';
    const abs = Math.abs(parseFloat(val));
    return abs >= 0.5 ? '#fff' : 'var(--text)';
  }

  return (
    <div className="heatmap-wrap">
      <table className="heatmap-table">
        <thead>
          <tr>
            <th style={{ minWidth: 70 }}></th>
            {cols.map((c, i) => (
              <th key={i} title={c} style={{ minWidth: 60, maxWidth: 80, overflow: 'hidden', textOverflow: 'ellipsis' }}>
                {c.length > 8 ? c.slice(0, 8) + '…' : c}
              </th>
            ))}
          </tr>
        </thead>
        <tbody>
          {matrix.map((row, ri) => (
            <tr key={ri}>
              <th style={{ textAlign: 'right', paddingRight: 10, fontWeight: 600, fontSize: 11 }} title={cols[ri]}>
                {cols[ri].length > 8 ? cols[ri].slice(0, 8) + '…' : cols[ri]}
              </th>
              {row.map((val, ci) => (
                <td key={ci} style={{ backgroundColor: cellColor(val), color: cellTextColor(val) }}>
                  <span>{val !== null && val !== undefined ? parseFloat(val).toFixed(2) : '—'}</span>
                </td>
              ))}
            </tr>
          ))}
        </tbody>
      </table>
      <div style={{ display: 'flex', gap: 16, flexWrap: 'wrap', marginTop: 12, fontSize: 11, color: 'var(--text-muted)' }}>
        <span><span style={{ display: 'inline-block', width: 12, height: 12, borderRadius: 2, background: 'rgba(239,68,68,.8)', marginRight: 4, verticalAlign: 'middle' }}></span>Strong positive ≥0.9</span>
        <span><span style={{ display: 'inline-block', width: 12, height: 12, borderRadius: 2, background: 'rgba(245,158,11,.8)', marginRight: 4, verticalAlign: 'middle' }}></span>Moderate 0.7–0.9</span>
        <span><span style={{ display: 'inline-block', width: 12, height: 12, borderRadius: 2, background: 'rgba(59,130,246,.7)', marginRight: 4, verticalAlign: 'middle' }}></span>Negative</span>
        <span><span style={{ display: 'inline-block', width: 12, height: 12, borderRadius: 2, background: 'rgba(79,70,229,.85)', marginRight: 4, verticalAlign: 'middle' }}></span>Self (1.0)</span>
      </div>
    </div>
  );
}

function GradeBadge({ grade }) {

    'Excellent':      'badge-success',
    'Good':           'badge-info',
    'Needs Cleaning': 'badge-warning',
    'High Risk':      'badge-danger',

  return <span className={`badge ${map[grade] || 'badge-purple'}`}>{grade || '—'}</span>;
}

function RiskBadge({ risk }) {
  const map = { CRITICAL: 'badge-danger', HIGH: 'badge-danger', MEDIUM: 'badge-warning', LOW: 'badge-success' };
  return <span className={`badge ${map[risk] || 'badge-purple'}`}>{risk || '—'}</span>;
}

function PriorityBadge({ priority }) {
  const map = { HIGH: 'badge-danger', MEDIUM: 'badge-warning', LOW: 'badge-success' };
  return <span className={`badge ${map[(priority||'').toUpperCase()] || 'badge-purple'}`}>{priority || '—'}</span>;
}

// AUTH PAGE (Login + Signup)
// ============================================================
function AuthPage({ mode, onNavigate }) {
  const { login, toast } = useApp();
  const [form, setForm] = useState({ name: '', email: '', password: '' });
  const [errors, setErrors] = useState({});
  const [loading, setLoading] = useState(false);
  const isLogin = mode === 'login';

  useEffect(() => { setForm({ name: '', email: '', password: '' }); setErrors({}); }, [mode]);

  const validate = () => {
    const e = {};
    if (!isLogin && !form.name.trim()) e.name = 'Name is required';
    if (!form.email.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)) e.email = 'Valid email required';
    if (form.password.length < 6) e.password = 'Minimum 6 characters';
    setErrors(e);
    return Object.keys(e).length === 0;
  };

  const handleSubmit = async (e) => {
    e.preventDefault();
    if (!validate()) return;
    setLoading(true);
    try {
      await new Promise(r => setTimeout(r, 600));
      const userData = { name: form.name || form.email.split('@')[0], email: form.email };
      login(userData, 'demo-jwt-' + Date.now());
      toast(`Welcome${isLogin ? ' back' : ''}, ${userData.name}!`, 'success');
      onNavigate('dashboard');
    } catch { toast('Authentication failed.', 'error'); }
    finally { setLoading(false); }
  };

  return (
    <div className="auth-page">
      <div className="auth-card">
        <div className="auth-logo">
          <div className="logo-big">🔍</div>
          <h1>DataQA</h1>
          <p>{isLogin ? 'Sign in to your account' : 'Create your free account'}</p>
        </div>
        <form onSubmit={handleSubmit}>
          {!isLogin && (
            <div className="form-group">
              <label className="form-label">Full Name</label>
              <input className="form-input" placeholder="Your name" value={form.name}
                onChange={e => setForm({ ...form, name: e.target.value })} />
              {errors.name && <div className="form-error">{errors.name}</div>}
            </div>
          )}
          <div className="form-group">
            <label className="form-label">Email Address</label>

function UploadPage({ onAnalyzed }) {
  const { toast } = useApp();
  const [file, setFile]           = useState(null);
  const [drag, setDrag]           = useState(false);
  const [progress, setProgress]   = useState(0);
  const [loading, setLoading]     = useState(false);
  const [targetCol, setTargetCol] = useState('');
  const [availableCols, setAvailableCols] = useState([]);
  const [suggestedAfterUpload, setSuggestedAfterUpload] = useState([]);
  const inputRef = useRef();
  const ACCEPTED = ['.csv', '.xlsx', '.xls', '.json', '.zip'];

  const isZip = file && file.name.toLowerCase().endsWith('.zip');

  const validateFile = (f) => {
    const ext = '.' + f.name.split('.').pop().toLowerCase();
    if (!ACCEPTED.includes(ext)) { toast('Unsupported file type. Use CSV, Excel, JSON, or ZIP.', 'error'); return false; }
    if (f.size > 200 * 1024 * 1024) { toast('File too large. Max 200 MB.', 'error'); return false; }
    return true;
  };

  const handleFile = (f) => {
    if (f && validateFile(f)) {
      setFile(f);
      setAvailableCols([]);
      setSuggestedAfterUpload([]);
    }
  };
  const handleDrop = (e) => { e.preventDefault(); setDrag(false); handleFile(e.dataTransfer.files[0]); };

  const handleAnalyze = async () => {
    if (!file) { toast('Please select a file first.', 'error'); return; }
    setLoading(true); setProgress(0); setAvailableCols([]); setSuggestedAfterUpload([]);

    for (let i = 10; i <= 80; i += 10) {
      await new Promise(r => setTimeout(r, 80));
      setProgress(i);
    }

    try {
      let result;
      let usedBackend = false;

      try {
        const formData = new FormData();
        formData.append('file', file);
        if (targetCol.trim()) formData.append('target_column', targetCol.trim());

        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 60000);
        const response = await fetch('http://localhost:5000/api/analyze', {
          method: 'POST', body: formData, signal: controller.signal,
        });
        clearTimeout(timeout);
        const data = await response.json();

        if (!response.ok || data.error) {
          if (data.available_columns) {
            setAvailableCols(data.available_columns);
            toast('Column not found. Pick one from the list below.', 'error');
            setLoading(false); setProgress(0); return;
          }
          throw new Error(data.error || `Backend error ${response.status}`);
        }

        result = data;
        usedBackend = true;

        // Show suggested targets if backend gave them and no target was used
        if (!targetCol.trim() && result.suggested_targets && result.suggested_targets.length > 0) {
          setSuggestedAfterUpload(result.suggested_targets);
        }
      } catch (backendErr) {
        const isNet = backendErr.name === 'AbortError' ||
          ['fetch', 'Failed to fetch', 'NetworkError', 'Load failed'].some(s => (backendErr.message || '').includes(s));
        if (isNet) {
          console.warn('[DataQA] Backend offline, using mock data');
          result = generateMockReport(file.name);
        } else {
          throw backendErr;
        }
      }

      setProgress(100);
      await new Promise(r => setTimeout(r, 200));
      toast(usedBackend ? '✅ Analysis complete!' : '✅ Demo mode — backend offline', usedBackend ? 'success' : 'warning');
      onAnalyzed({ ...result, _usedBackend: usedBackend });
    } catch (err) {
      toast('Analysis failed: ' + err.message, 'error');
      setProgress(0);
    } finally {
      setLoading(false);
    }
  };

  const handleReset = () => {
    setFile(null); setTargetCol(''); setProgress(0);
    setAvailableCols([]); setSuggestedAfterUpload([]);
  };

  return (
    <div>
      <h2 className="section-title">Upload Dataset</h2>
      <p className="section-subtitle">Get a full quality analysis — missing values, outliers, skewness, correlations, and ML readiness.</p>
      <div style={{ maxWidth: 680 }}>
        <div className="card" style={{ marginBottom: 20 }}>
          <div
            className={`upload-zone ${drag ? 'drag-over' : ''}`}
            onDragOver={e => { e.preventDefault(); setDrag(true); }}
            onDragLeave={() => setDrag(false)}
            onDrop={handleDrop}
            onClick={() => !file && inputRef.current.click()}
          >
            <input ref={inputRef} type="file" accept=".csv,.xlsx,.xls,.json,.zip"
              style={{ display: 'none' }} onChange={e => handleFile(e.target.files[0])} />
            {file ? (
              <>
                <div className="upload-icon">✅</div>
                <div className="upload-title">File Ready</div>
                <div className="upload-file-info">
                  <span style={{ fontSize: 24 }}>{isZip ? '📦' : '📄'}</span>
                  <span className="upload-file-name">{file.name}</span>
                  <span style={{ fontSize: 13, color: 'var(--text-muted)' }}>{(file.size / 1024).toFixed(1)} KB</span>
                  <button className="btn btn-ghost btn-sm" style={{ padding: '4px 10px' }}
                    onClick={e => { e.stopPropagation(); handleReset(); }}>✕</button>
                </div>
                {isZip && (
                  <div className="zip-indicator">
                    📦 ZIP detected — multiple files will be analyzed together
                  </div>
                )}
              </>
            ) : (
              <>
                <div className="upload-icon">📁</div>
                <div className="upload-title">Drop your dataset here</div>
                <div className="upload-subtitle">or click to browse · CSV, Excel, JSON, ZIP · Max 200 MB</div>
              </>
            )}
          </div>
          {loading && (
            <div style={{ marginTop: 16 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 13, marginBottom: 6 }}>
                <span>Analyzing dataset…</span><span>{progress}%</span>
              </div>
              <div className="progress-bar-wrap"><div className="progress-bar" style={{ width: `${progress}%` }} /></div>
            </div>
          )}
        </div>

        <div className="card">
          <div className="form-group">
            <label className="form-label">Target Column <span style={{ fontWeight: 400, color: 'var(--text-muted)' }}>(Optional)</span></label>
            <input className="form-input"
              placeholder="e.g., Rating, label, churn, price"
              value={targetCol}
              onChange={e => { setTargetCol(e.target.value); setAvailableCols([]); }} />
            <div className="form-hint">
              Leave blank for general data quality analysis. For ML-specific checks, enter your label column name.
            </div>
            {availableCols.length > 0 && (
              <div style={{ marginTop: 10, padding: 12, background: 'rgba(239,68,68,.06)', borderRadius: 8, border: '1px solid rgba(239,68,68,.2)' }}>
                <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--danger)', marginBottom: 8 }}>❌ Column not found. Click to select:</div>
                <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
                  {availableCols.map(col => (
                    <button key={col} className="badge badge-info" style={{ cursor: 'pointer', border: 'none', fontSize: 12, padding: '4px 10px' }}
                      onClick={() => { setTargetCol(col); setAvailableCols([]); }}>{col}</button>
                  ))}
                </div>
              </div>
            )}
            {suggestedAfterUpload.length > 0 && (
              <div style={{ marginTop: 10, padding: 12, background: 'rgba(99,102,241,.06)', borderRadius: 8, border: '1px solid rgba(99,102,241,.2)' }}>
                <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--primary)', marginBottom: 8 }}>
                  💡 Suggested targets: click to re-analyze with a target
                </div>
                <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
                  {suggestedAfterUpload.map(s => (
                    <button key={s.column} className="badge badge-purple" style={{ cursor: 'pointer', border: 'none', fontSize: 12, padding: '4px 10px' }}
                      onClick={() => setTargetCol(s.column)}>
                      {s.column} <span style={{ opacity: 0.7 }}>({Math.round(s.confidence * 100)}%)</span>
                    </button>
                  ))}
                </div>
              </div>
            )}
          </div>
          <div style={{ display: 'flex', gap: 12 }}>
            <button className="btn btn-primary" onClick={handleAnalyze} disabled={loading || !file}
              style={{ flex: 1, justifyContent: 'center' }}>
              {loading ? '⏳ Analyzing…' : '🔍 Analyze Dataset'}
            </button>
            <button className="btn btn-ghost" onClick={handleReset} disabled={loading}>Reset</button>
          </div>
        </div>
      </div>
    </div>
  );
}

  const ml        = report.ml_readiness;
  const recs      = report.recommendations || [];
  const dists     = report.distributions   || [];
  const corrMat   = report.correlation_matrix || {};

  const outlierCols  = (checks.outliers || {}).affected_columns || [];

  const highCorr     = (checks.correlation || {}).high_pairs || [];

  const totalScore = score.total || 0;

        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>

          {/* Missing Values */}
          <Collapsible title={`🔴 Missing Values`} badge={<span className="badge badge-warning">{missingCols.length} cols</span>} defaultOpen={missingCols.length > 0}>
            {missingCols.length === 0 ? <p style={{ fontSize: 13, color: 'var(--text-muted)', padding: '8px 4px' }}>✅ No missing values detected.</p> : (
              <div className="table-wrap">
                <table><thead><tr><th>Column</th><th>Missing</th><th>%</th><th>Risk</th></tr></thead>
                <tbody>
                  {missingCols.map((c, i) => (
                    <tr key={i}><td style={{ fontWeight: 500 }}>{c.col}</td><td>{c.missing}</td><td>{c.pct}%</td><td><RiskBadge risk={c.risk} /></td></tr>
                  ))}
                </tbody></table>
              </div>
            )}
          </Collapsible>

          {/* Outliers */}
          <Collapsible title={`🟡 Outliers`} badge={<span className="badge badge-warning">{outlierCols.length} cols</span>} defaultOpen={outlierCols.length > 0}>
            {outlierCols.length === 0 ? <p style={{ fontSize: 13, color: 'var(--text-muted)', padding: '8px 4px' }}>✅ No significant outliers detected.</p> : (
              <div className="table-wrap">
                <table><thead><tr><th>Column</th><th>IQR Count</th><th>Z-Score Count</th><th>Risk</th></tr></thead>
                <tbody>
                  {outlierCols.map((c, i) => (
                    <tr key={i}><td style={{ fontWeight: 500 }}>{c.col}</td><td>{c.iqr_count}</td><td>{c.zscore_count}</td><td><RiskBadge risk={c.risk} /></td></tr>
                  ))}
                </tbody></table>
              </div>
            )}
          </Collapsible>

          {/* Skewness */}
          <Collapsible title={`🔵 Skewness`} badge={<span className="badge badge-info">{skewCols.length} cols</span>}>
            {skewCols.length === 0 ? <p style={{ fontSize: 13, color: 'var(--text-muted)', padding: '8px 4px' }}>✅ No highly skewed columns.</p> : (
              <div className="table-wrap">
                <table><thead><tr><th>Column</th><th>Skewness</th><th>Level</th></tr></thead>
                <tbody>
                  {skewCols.map((c, i) => (
                    <tr key={i}><td style={{ fontWeight: 500 }}>{c.col}</td><td>{c.skewness}</td>
                    <td><span className={`badge ${c.level === 'HIGH' ? 'badge-danger' : 'badge-warning'}`}>{c.level}</span></td></tr>
                  ))}
                </tbody></table>
              </div>
            )}
          </Collapsible>

          {/* Wrong Data Types */}
          <Collapsible title={`🔧 Wrong Data Types`} badge={<span className="badge badge-purple">{wrongTypes.length} cols</span>}>
            {wrongTypes.length === 0 ? <p style={{ fontSize: 13, color: 'var(--text-muted)', padding: '8px 4px' }}>✅ All column types look correct.</p> : (
              <div className="table-wrap">
                <table><thead><tr><th>Column</th><th>Current Type</th><th>Suggested Type</th></tr></thead>
                <tbody>
                  {wrongTypes.map((c, i) => (
                    <tr key={i}><td style={{ fontWeight: 500 }}>{c.col}</td><td>{c.current_type}</td>
                    <td><span className="badge badge-info">{c.suggested_type}</span></td></tr>
                  ))}
                </tbody></table>
              </div>
            )}
          </Collapsible>

          {/* Invalid Values */}
          <Collapsible title={`⚠️ Invalid Values`} badge={<span className="badge badge-warning">{negInvalid.length + zeroInvalid.length} issues</span>}>
            {negInvalid.length === 0 && zeroInvalid.length === 0 ? (
              <p style={{ fontSize: 13, color: 'var(--text-muted)', padding: '8px 4px' }}>✅ No invalid values detected.</p>
            ) : (
              <div>
                {negInvalid.length > 0 && (
                  <>
                    <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 8, color: 'var(--danger)' }}>Negative values where invalid:</div>
                    <div className="table-wrap" style={{ marginBottom: 12 }}>
                      <table><thead><tr><th>Column</th><th>Count</th></tr></thead>
                      <tbody>{negInvalid.map((c, i) => <tr key={i}><td style={{ fontWeight: 500 }}>{c.col}</td><td>{c.count}</td></tr>)}</tbody></table>
                    </div>
                  </>
                )}
                {zeroInvalid.length > 0 && (
                  <>
                    <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 8, color: 'var(--warning)' }}>Zero values where invalid:</div>
                    <div className="table-wrap">
                      <table><thead><tr><th>Column</th><th>Count</th></tr></thead>
                      <tbody>{zeroInvalid.map((c, i) => <tr key={i}><td style={{ fontWeight: 500 }}>{c.col}</td><td>{c.count}</td></tr>)}</tbody></table>
                    </div>
                  </>
                )}
              </div>
            )}
          </Collapsible>

          {/* High Correlations */}
          <Collapsible title={`🔗 High Correlations`} badge={<span className="badge badge-info">{allCorrPairs.length} pairs</span>}>
            {allCorrPairs.length === 0 ? <p style={{ fontSize: 13, color: 'var(--text-muted)', padding: '8px 4px' }}>✅ No high correlations found.</p> : (
              <div className="table-wrap">
                <table><thead><tr><th>Column 1</th><th>Column 2</th><th>Correlation</th></tr></thead>
                <tbody>
                  {allCorrPairs.map((p, i) => (
                    <tr key={i}><td style={{ fontWeight: 500 }}>{p.col1}</td><td style={{ fontWeight: 500 }}>{p.col2}</td>
                    <td><span className={`badge ${Math.abs(p.correlation) >= 0.9 ? 'badge-danger' : 'badge-warning'}`}>{p.correlation}</span></td></tr>
                  ))}
                </tbody></table>
              </div>
            )}
          </Collapsible>
        </div>
      </div>

      {/* H. COLUMN ANALYSIS TABLE */}
      <div className="card mb-6">
        <div className="card-header">
          <div><div className="card-title">📋 Column Analysis</div><div className="card-subtitle">Per-column profile · {cols.length} columns</div></div>
        </div>
        {cols.length === 0 ? (
          <div className="empty-state" style={{ padding: '20px 0' }}><p>No column data available.</p></div>
        ) : (
          <>
            <div className="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Name</th><th>Type</th><th>Missing</th><th>Unique</th>
                    <th>Outliers (IQR)</th><th>Skewness</th><th>Flags</th><th>Status</th>
                  </tr>
                </thead>
                <tbody>
                  {displayCols.map((c, i) => {
                    const hasIssue = c.missing > 0 || (c.outliers_iqr || 0) > 0 || c.is_constant || c.suggested_dtype;
                    return (
                      <tr key={i} className={hasIssue ? 'highlight-row' : ''}>
                        <td style={{ fontWeight: 500 }}>{c.name}</td>
                        <td><span className="badge badge-purple" style={{ fontSize: 11 }}>{c.dtype_class || '—'}</span></td>
                        <td>{c.missing > 0 ? <span style={{ color: 'var(--warning)', fontWeight: 600 }}>{c.missing} ({c.missing_pct}%)</span> : <span style={{ color: 'var(--success)' }}>0</span>}</td>
                        <td>{c.unique ?? '—'}</td>
                        <td>{(c.outliers_iqr || 0) > 0 ? <span style={{ color: 'var(--danger)', fontWeight: 600 }}>{c.outliers_iqr}</span> : '0'}</td>
                        <td>{c.skewness !== null && c.skewness !== undefined ? c.skewness.toFixed(2) : '—'}</td>
                        <td>
                          <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap' }}>
                            {c.is_id_like   && <span className="badge badge-info"    style={{ fontSize: 10 }}>ID</span>}
                            {c.is_constant  && <span className="badge badge-danger"  style={{ fontSize: 10 }}>Constant</span>}
                            {c.suggested_dtype && <span className="badge badge-warning" style={{ fontSize: 10 }}>→{c.suggested_dtype}</span>}
                          </div>
                        </td>
                        <td>{hasIssue ? <span className="badge badge-warning">⚠️ Review</span> : <span className="badge badge-success">✅ OK</span>}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
            {cols.length > 20 && (
              <div style={{ marginTop: 12, textAlign: 'center' }}>
                <button className="btn btn-ghost btn-sm" onClick={() => setColsExpanded(e => !e)}>
                  {colsExpanded ? `▲ Show first 20 columns` : `▼ Show all ${cols.length} columns`}
                </button>
              </div>
            )}
          </>
        )}
      </div>

      {/* I. ML READINESS */}
      {ml && (
        <div className="card mb-6">
          <div className="card-header">
            <div><div className="card-title">🤖 ML Readiness</div><div className="card-subtitle">Machine learning suitability analysis</div></div>
            <span className="badge badge-info">{ml.task_type === 'classification' ? '🔵 Classification' : '🟠 Regression'}</span>
          </div>
          <div className="grid-2">
            <div>
              {ml.task_type === 'classification' && ml.class_imbalance && (
                <div>
                  <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 12 }}>Class Distribution</div>
                  <DonutChart
                    labels={Object.keys(ml.class_imbalance.class_counts || {})}
                    values={Object.values(ml.class_imbalance.class_counts || {})}
                    colors={['#6366f1','#10b981','#f59e0b','#ef4444','#3b82f6','#8b5cf6']}
                  />
                  <div style={{ marginTop: 12, display: 'flex', alignItems: 'center', gap: 10 }}>
                    <span style={{ fontSize: 13 }}>Imbalance Risk:</span>
                    <RiskBadge risk={ml.class_imbalance.risk} />
                    <span style={{ fontSize: 13, color: 'var(--text-muted)' }}>
                      Dominant: {ml.class_imbalance.dominant_class} ({ml.class_imbalance.dominant_pct}%)
                    </span>
                  </div>
                </div>
              )}
              {ml.task_type === 'regression' && (
                <div style={{ padding: 16, background: 'var(--bg)', borderRadius: 8 }}>
                  <div style={{ fontSize: 13, color: 'var(--text-muted)' }}>Target Skewness</div>
                  <div style={{ fontSize: 22, fontWeight: 800 }}>{ml.target_skewness ?? '—'}</div>
                  <div style={{ fontSize: 12, color: 'var(--text-muted)', marginTop: 4 }}>
                    {Math.abs(ml.target_skewness || 0) > 2 ? '⚠️ Highly skewed — consider log transform' : '✅ Acceptable skewness'}
                  </div>
                </div>
              )}
            </div>
            <div>
              {ml.leakage_risk_cols && ml.leakage_risk_cols.length > 0 && (
                <div style={{ marginBottom: 16 }}>
                  <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--danger)', marginBottom: 8 }}>🚨 Leakage Risk Columns:</div>
                  <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
                    {ml.leakage_risk_cols.map((c, i) => <span key={i} className="badge badge-danger">{c}</span>)}
                  </div>
                </div>
              )}
              {ml.low_variance_features && ml.low_variance_features.length > 0 && (
                <div>
                  <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--warning)', marginBottom: 8 }}>📉 Low Variance Features:</div>
                  <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
                    {ml.low_variance_features.map((c, i) => <span key={i} className="badge badge-warning">{c}</span>)}
                  </div>
                </div>
              )}
              {ml.constant_features && ml.constant_features.length > 0 && (
                <div style={{ marginTop: 12 }}>
                  <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--text-muted)', marginBottom: 8 }}>🚫 Constant Features:</div>
                  <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
                    {ml.constant_features.map((c, i) => <span key={i} className="badge badge-purple">{c}</span>)}
                  </div>
                </div>
              )}
              {(!ml.leakage_risk_cols || ml.leakage_risk_cols.length === 0) &&
               (!ml.low_variance_features || ml.low_variance_features.length === 0) &&
               (!ml.constant_features || ml.constant_features.length === 0) && (
                <div style={{ padding: 16, background: 'rgba(16,185,129,.06)', borderRadius: 8, border: '1px solid rgba(16,185,129,.2)', fontSize: 13, color: 'var(--success)' }}>
                  ✅ No leakage risk, low variance, or constant features detected.
                </div>
              )}
            </div>
          </div>
        </div>
      )}

      {/* J. AI RECOMMENDATIONS */}
      {recs.length > 0 && (
        <div className="card mb-6">
          <div className="card-header">
            <div><div className="card-title">💡 AI Recommendations</div><div className="card-subtitle">{recs.length} actionable suggestions</div></div>
          </div>
          {recs.map((r, i) => (
            <div key={i} className="rec-card">
              <div className="rec-card-header">
                <div className="rec-card-title">
                  <span style={{ fontSize: 20 }}>{r.icon || '💡'}</span>
                  <span>{r.title}</span>
                </div>
                <PriorityBadge priority={r.priority || r.Priority} />
              </div>
              <div className="rec-card-body">
                {r.problem && <div><b>Problem:</b> {r.problem}</div>}
                {r.impact  && <div style={{ marginTop: 4 }}><b>Impact:</b> {r.impact}</div>}
                {(r.fix || r.desc) && (
                  <div className="rec-fix">{r.fix || r.desc}</div>
                )}
              </div>
            </div>
          ))}
        </div>
      )}

      {/* K. EXPORT BUTTONS */}
      <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap', marginBottom: 32 }}>
        <button className="btn btn-success" onClick={handleDownload}>⬇️ Download JSON Report</button>
        <button className="btn btn-ghost" onClick={() => window.print()}>🖨️ Export PDF</button>
      </div>
    </div>
  );
}

// ============================================================
// REPORT PAGE — supports both single-file and ZIP shapes
// ============================================================
function ReportPage({ report }) {
  const [activeFileIdx, setActiveFileIdx] = useState(0);

  if (!report) {
    return (
      <div>
        <h2 className="section-title">Analysis Report</h2>
        <div className="empty-state">
          <div className="empty-icon">📊</div>
          <h3>No Report Yet</h3>
          <p>Upload a dataset to see the analysis report here.</p>
        </div>
      </div>
    );
  }

  const isZip = Array.isArray(report.files);
  const relationships = report.relationships || [];

  if (isZip) {
    const files = report.files || [];
    const activeFile = files[activeFileIdx] || null;

    return (
      <div>
        <h2 className="section-title">ZIP Analysis Report</h2>
        <p className="section-subtitle">{files.length} file(s) analyzed from ZIP archive</p>

        {/* File selector tabs */}
        <div className="tab-bar">
          {files.map((f, i) => (
            <button key={i} className={`tab-btn ${activeFileIdx === i ? 'active' : ''}`}
              onClick={() => setActiveFileIdx(i)}>
              📄 {f.filename || `File ${i + 1}`}
              {f.score && (
                <span className={`badge ${(f.score.total || 0) >= 70 ? 'badge-success' : (f.score.total || 0) >= 50 ? 'badge-warning' : 'badge-danger'}`}
                  style={{ marginLeft: 6, fontSize: 11 }}>{f.score.total}/100</span>
              )}
            </button>
          ))}
        </div>

        {/* Relationships panel */}
        {relationships.length > 0 && (
          <div className="card mb-6" style={{ border: '1px solid rgba(59,130,246,.3)', background: 'rgba(59,130,246,.04)' }}>
            <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 10 }}>🔗 Detected File Relationships</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
              {relationships.map((rel, i) => (
                <div key={i} style={{ fontSize: 13, display: 'flex', alignItems: 'center', gap: 8 }}>
                  <span className="badge badge-info">{rel.file1}</span>
                  <span style={{ color: 'var(--text-muted)' }}>{rel.col1}</span>
                  <span>→</span>
                  <span className="badge badge-info">{rel.file2}</span>
                  <span style={{ color: 'var(--text-muted)' }}>{rel.col2}</span>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* Selected file report */}
        {activeFile ? <SingleFileReport report={activeFile} /> : (
          <div className="empty-state"><p>No file selected.</p></div>
        )}
      </div>
    );
  }

  // Single file report
  return (
    <div>
      <h2 className="section-title">Analysis Report</h2>
      <p className="section-subtitle">{report.filename || 'Dataset'} · Analyzed {report.date || ''}</p>
      <SingleFileReport report={report} />
    </div>
  );
}

// ============================================================
// HISTORY PAGE
// ============================================================
function HistoryPage({ history, onNavigate, onSelectReport }) {
  if (history.length === 0) {
    return (
      <div>
        <h2 className="section-title">Analysis History</h2>
        <div className="empty-state">
          <div className="empty-icon">🕐</div>
          <h3>No History Yet</h3>
          <p>Your past dataset analyses will appear here.</p>
          <button className="btn btn-primary mt-4" onClick={() => onNavigate('upload')}>📤 Upload First Dataset</button>
        </div>
      </div>
    );
  }

  return (
    <div>
      <h2 className="section-title">Analysis History</h2>
      <p className="section-subtitle">{history.length} dataset{history.length !== 1 ? 's' : ''} analyzed</p>
      <div className="card">
        <div className="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Filename</th><th>Date</th><th>Score</th><th>Grade</th><th>Action</th>
              </tr>
            </thead>
            <tbody>
              {[...history].reverse().map((h, i) => (
                <tr key={i}>
                  <td style={{ fontWeight: 500 }}>{h.filename || '—'}</td>
                  <td style={{ color: 'var(--text-muted)', fontSize: 13 }}>{h.date || '—'}</td>
                  <td>
                    <span className={`badge ${(h.score||0) >= 70 ? 'badge-success' : (h.score||0) >= 50 ? 'badge-warning' : 'badge-danger'}`}>
                      {h.score ?? '—'}/100
                    </span>
                  </td>
                  <td><GradeBadge grade={h.grade} /></td>
                  <td>
                    <button className="btn btn-ghost btn-sm" onClick={() => { onSelectReport(h._report); onNavigate('reports'); }}>
                      📊 View Report
                    </button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// MAIN APP
// ============================================================
function App() {
  const { user } = useApp();
  const [page, setPage] = useState('landing');
  const [report, setReport] = useState(null);
  const [history, setHistory] = useState(() => {
    try { return JSON.parse(localStorage.getItem('dqa_history') || '[]'); } catch { return []; }
  });
  const [sidebarOpen, setSidebarOpen] = useState(false);

  // Navigate to landing if not logged in and trying to access app pages
  useEffect(() => {
    if (!user && !['landing','login','signup'].includes(page)) setPage('landing');
    if (user && page === 'landing') setPage('dashboard');
  }, [user]);

  const saveHistory = (entry) => {
    const updated = [...history, entry].slice(-50);
    setHistory(updated);
    try { localStorage.setItem('dqa_history', JSON.stringify(updated)); } catch {}
  };

  const handleAnalyzed = (result) => {
    setReport(result);
    // Determine score value for history entry
    let scoreVal, gradeVal;
    if (result.files) {
      // ZIP — aggregate avg score
      const scores = (result.files || []).map(f => (f.score || {}).total || 0);
      scoreVal = scores.length ? Math.round(scores.reduce((a,b) => a+b, 0) / scores.length) : null;
      gradeVal = scoreVal >= 90 ? 'Excellent' : scoreVal >= 70 ? 'Good' : scoreVal >= 50 ? 'Needs Cleaning' : 'High Risk';
    } else {
      scoreVal = (result.score || {}).total ?? result.score ?? null;
      gradeVal = (result.score || {}).grade ?? null;
    }
    saveHistory({
      filename: result.filename || 'dataset',
      date: result.date || new Date().toLocaleDateString(),
      score: scoreVal,
      grade: gradeVal,
      _report: result,
    });
    setPage('reports');
  };

  const pageTitle = {
    dashboard: 'Dashboard',
    upload:    'Upload Dataset',
    reports:   'Analysis Report',
    history:   'History',
  }[page] || 'DataQA';

  // Public pages
  if (page === 'landing') return <LandingPage onNavigate={setPage} />;
  if (page === 'login')   return <AuthPage mode="login"  onNavigate={setPage} />;
  if (page === 'signup')  return <AuthPage mode="signup" onNavigate={setPage} />;

  // Authenticated app layout
  return (
    <div className="app-layout">
      <Sidebar
        page={page}
        onNavigate={setPage}
        open={sidebarOpen}
        onClose={() => setSidebarOpen(false)}
      />
      <div className="main-content">
        <Topbar title={pageTitle} onMenuClick={() => setSidebarOpen(o => !o)} />
        <main className="page-content">
          {page === 'dashboard' && <DashboardPage onNavigate={setPage} history={history} />}
          {page === 'upload'    && <UploadPage onAnalyzed={handleAnalyzed} />}
          {page === 'reports'   && <ReportPage report={report} />}
          {page === 'history'   && <HistoryPage history={history} onNavigate={setPage} onSelectReport={r => setReport(r)} />}
        </main>
      </div>
    </div>
  );
}

// ============================================================
// ROOT RENDER
// ============================================================
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(
  <AppProvider>
    <App />
  </AppProvider>
);
  </script>
</body>
</html>
